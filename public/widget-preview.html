<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  </style>
</head>
<body>

  <script>
    // Poll until the widget trigger button appears, click it to open, then hide the trigger.
    let attempts = 0;

    function tryOpen() {
      // Most widget launchers are buttons or divs with role=button near the bottom of the body.
      // We grab all visible candidates and click the first one we find.
      const candidates = Array.from(
        document.querySelectorAll('button, [role="button"], div[class*="chat"], div[class*="widget"], div[class*="launcher"], div[class*="bubble"]')
      ).filter(el => {
        const rect = el.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0;
      });

      if (candidates.length > 0) {
        const trigger = candidates[candidates.length - 1]; // usually the last one added
        trigger.click();
        // After a short delay, hide the trigger so only the open panel shows
        setTimeout(() => {
          trigger.style.opacity = '0';
          trigger.style.pointerEvents = 'none';
        }, 400);
      } else if (attempts < 40) {
        attempts++;
        setTimeout(tryOpen, 150);
      }
    }

    // Give the widget script a head-start before we start polling
    setTimeout(tryOpen, 800);
  </script>

  <script
    src="https://synqai.up.railway.app/widget.js"
    data-collect-name="true"
    data-collect-email="true"
  ></script>

</body>
</html>
